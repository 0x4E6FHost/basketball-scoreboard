<html>
    <head>

    </head>
    <body>
        <div class="container">
            <div>
                <h3>HOME</h3>
                <h1 id="home-score-el"></h1>
                <button onclick="addHomePoint(1)">+1</button>
                <button onclick="addHomePoint(2)">+2</button>
                <button onclick="addHomePoint(3)">+3</button>
            </div>
            <div>
                <h3>GUEST</h3>

                <button onclick="addGuestPoint(3)">+3</button>
            </div>
        </div>
        <div class="options"><button onclick="resetGame()">Reset Game</button></div>
        <script src="index.js"></script>
    </body>
</html>
